# Skills Registry
# ---------------
# Single source of truth for all skills across all sources and machines.
#
# Fields:
#   name        - unique identifier, matches the skill directory name
#   description - one-line summary (pulled from SKILL.md if omitted by sync.sh)
#   audience    - personal | team | project
#   source      - which repo/collection this came from (informational only)
#   path        - path to skill dir, relative to this registry file
#                 if the path doesn't exist on this machine, it is silently skipped
#   agents      - which harnesses support this skill
#                 cloudcode: reads SKILL.md via skills.paths in cloudcode.json
#                 gemini:    reads GEMINI.md + gemini-extension.json via ~/.gemini/config/skills/
#   active      - false to exclude from sync entirely (useful for WIP or retired skills)
#   tags        - optional free-form tags for catalog/search

# ---------------------------------------------------------------------------
# Personal skills (github.com/zeroasterisk/skills)
# Available on all machines
# ---------------------------------------------------------------------------

- name: elixir-best-practices
  audience: personal
  source: zeroasterisk/skills
  path: elixir-best-practices
  agents: [cloudcode, gemini]
  active: true
  tags: [elixir, phoenix, liveview, language]

